<!DOCTYPE html>

<title>DUNGEON BLADE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  touch-action: none;
}

<body>
<canvas id="c"></canvas>
<script>
'use strict';

const W = 320, H = 180;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const isMobile = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

function resize() {
  const sx = window.innerWidth  / W;
  const sy = window.innerHeight / H;
  const s  = isMobile()
    ? Math.min(sx, sy)
    : Math.max(1, Math.min(Math.floor(sx), Math.floor(sy)));
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type, vol, freqEnd) {
  if (AC.state === 'suspended') AC.resume();
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if (freqEnd !== undefined) o.frequency.linearRampToValueAtTime(freqEnd, AC.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.18, AC.currentTime);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function sfxJump()    { beep(280, 0.12, 'square', 0.15, 520); }
function sfxAttack()  { beep(600, 0.06, 'square', 0.12); beep(400, 0.08, 'sawtooth', 0.08); }
function sfxHit()     { beep(180, 0.15, 'sawtooth', 0.18, 80); }
function sfxDeath()   { beep(300, 0.08, 'square', 0.18, 100); setTimeout(()=>beep(100,0.3,'sawtooth',0.2),80); }
function sfxVictory() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'square',0.18),i*180)); }
function sfxFireball(){ beep(220, 0.2, 'sawtooth', 0.12, 440); }
function sfxBossHit() { beep(120, 0.2, 'sawtooth', 0.2, 60); }
function sfxLand()    { beep(80, 0.06, 'square', 0.1); }

const GRAVITY = 0.28, JUMP_VEL = -5.5, PLAYER_SPEED = 1.8;
const GROUND_Y = 148, LEVEL_W = 4000;

const GROUND_SEGS = [
  {x1:0, x2:800}, {x1:860, x2:1500}, {x1:1560, x2:2400}, {x1:2400, x2:LEVEL_W}
];
const PLATFORMS = [
  [120,120,64],[260,104,56],[440,96,48],[620,112,64],[900,124,56],
  [1020,108,64],[1200,96,56],[1350,112,48],[1600,120,64],[1760,104,56],
  [1940,96,56],[2100,112,64],[2260,128,48],[2520,116,64],[2700,100,56],
  [2880,112,64],[3060,124,48],[3200,108,64],[3380,96,56],[3500,120,80],
];

const keys = {};
window.addEventListener('keydown', e => { keys[e.code]=true; if(AC.state==='suspended')AC.resume(); });
window.addEventListener('keyup',   e => { keys[e.code]=false; });

const BTNS = {
  left:  {x:4,  y:136,w:38,h:38}, right: {x:48, y:136,w:38,h:38},
  attack:{x:234,y:136,w:38,h:38}, jump:  {x:278,y:136,w:38,h:38},
};
const touch = {left:false,right:false,jump:false,attack:false};
let touchTap = false;

function toCanvasXY(t) {
  const r = canvas.getBoundingClientRect();
  return {x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height)};
}
function refreshTouch(touches) {
  touch.left=touch.right=touch.jump=touch.attack=false;
  for(let i=0;i<touches.length;i++){
    const p=toCanvasXY(touches[i]);
    for(const [k,b] of Object.entries(BTNS))
      if(p.x>=b.x&&p.x<b.x+b.w&&p.y>=b.y&&p.y<b.y+b.h) touch[k]=true;
  }
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(AC.state==='suspended')AC.resume();touchTap=true;refreshTouch(e.touches);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();refreshTouch(e.touches);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();refreshTouch(e.touches);},{passive:false});
canvas.addEventListener('touchcancel',e=>{e.preventDefault();refreshTouch(e.touches);},{passive:false});

function pressed(codes) {
  if(codes.some(c=>keys[c])) return true;
  if((codes.includes('ArrowLeft') ||codes.includes('KeyA'))&&touch.left)   return true;
  if((codes.includes('ArrowRight')||codes.includes('KeyD'))&&touch.right)  return true;
  if((codes.includes('ArrowUp')||codes.includes('KeyW')||codes.includes('Space'))&&touch.jump) return true;
  if((codes.includes('KeyZ')||codes.includes('KeyX'))&&touch.attack) return true;
  return false;
}

let particles=[];
function spawnParticles(x,y,color,count,speed){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=(0.5+Math.random())*(speed||1.5);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:28+Math.random()*20|0,maxLife:48,color,size:1+(Math.random()>0.5?1:0)});
  }
}
function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;});}
function drawParticles(camX){
  particles.forEach(p=>{ctx.globalAlpha=Math.min(1,p.life/48*2);ctx.fillStyle=p.color;ctx.fillRect((p.x-camX)|0,p.y|0,p.size,p.size);});
  ctx.globalAlpha=1;
}

function px(color,x,y,w,h){ctx.fillStyle=color;ctx.fillRect(x|0,y|0,w||1,h||1);}

function drawPlayer(sx,sy,frame,facingRight,state,iframes){
  if(iframes>0&&Math.floor(iframes/5)%2===0)return;
  const f=Math.floor(frame)%4;
  ctx.save();
  if(!facingRight){ctx.translate((sx+6)|0,0);ctx.scale(-1,1);ctx.translate(-(sx+6)|0,0);}
  const x=sx|0,y=sy|0;
  px('#b8b8c8',x+2,y,8,5);px('#888898',x+1,y+1,1,3);px('#888898',x+10,y+1,1,3);px('#444455',x+3,y+2,6,2);
  px('#e8c880',x+3,y+5,6,3);px('#d4a860',x+3,y+8,6,1);
  px('#3850a0',x+2,y+9,8,7);px('#6878c8',x+3,y+9,6,2);px('#2038a0',x+2,y+9,1,7);px('#2038a0',x+9,y+9,1,7);px('#8898e0',x+5,y+10,2,1);
  if(state==='attack'){const sOff=f<2?0:2;px('#c8c8c8',x+10,y+7+sOff,2,8);px('#888888',x+10,y+6+sOff,3,2);px('#a06820',x+11,y+5+sOff,1,2);}
  else{px('#c8c8c8',x+10,y+10,2,7);px('#888888',x+10,y+9,3,2);px('#a06820',x+11,y+8,1,2);}
  px('#603800',x+2,y+16,8,2);px('#a06820',x+5,y+16,2,2);
  px('#1c2870',x+2,y+18,4,4);px('#1c2870',x+6,y+18,4,4);
  px('#503018',x+2,y+21,4,1);px('#503018',x+6,y+21,4,1);
  if(state==='run'){
    const la=[0,1,0,-1][f],ra=[0,-1,0,1][f];
    px('#1c2870',x+2,y+18+la,4,4);px('#1c2870',x+6,y+18+ra,4,4);
    px('#503018',x+2,y+21+la,4,1);px('#503018',x+6,y+21+ra,4,1);
  }
  ctx.restore();
}

function drawSkeleton(sx,sy,frame,dir){
  const f=Math.floor(frame)%4;
  ctx.save();
  if(dir<0){ctx.translate((sx+7)|0,0);ctx.scale(-1,1);ctx.translate(-(sx+7)|0,0);}
  const x=sx|0,y=sy|0;
  px('#d8d8c0',x+2,y,10,8);px('#d8d8c0',x+1,y+2,1,4);px('#d8d8c0',x+11,y+2,1,4);
  px('#000000',x+3,y+2,3,2);px('#000000',x+7,y+2,3,2);px('#ff3030',x+4,y+2,2,2);px('#ff3030',x+8,y+2,2,2);
  px('#d8d8c0',x+2,y+7,10,3);px('#d8d8c0',x+3,y+10,2,2);px('#d8d8c0',x+7,y+10,2,2);
  px('#b8b8a0',x+4,y+12,6,6);px('#d8d8c0',x+4,y+13,1,4);px('#d8d8c0',x+9,y+13,1,4);px('#d8d8c0',x+6,y+12,2,6);
  const aw=[0,1,0,-1][f];
  px('#b8b8a0',x+1,y+12+aw,3,2);px('#b8b8a0',x+10,y+12-aw,3,2);
  px('#b8b8a0',x+0,y+14+aw,3,4);px('#b8b8a0',x+11,y+14-aw,3,4);
  px('#b8b8a0',x+3,y+18,8,2);
  const ll=[0,2,0,-2][f],rl=[0,-2,0,2][f];
  px('#b8b8a0',x+3,y+20+ll,3,4);px('#b8b8a0',x+8,y+20+rl,3,4);
  px('#d0c090',x+2,y+23+ll,4,2);px('#d0c090',x+8,y+23+rl,4,2);
  ctx.restore();
}

function drawBat(sx,sy,frame){
  const f=Math.floor(frame)%4, x=sx|0, y=sy|0, wf=[0,-2,0,2][f];
  px('#2a0a40',x,y+4+wf,6,4);px('#3a1050',x+1,y+2+wf,4,2);
  px('#2a0a40',x+10,y+4+wf,6,4);px('#3a1050',x+11,y+2+wf,4,2);
  px('#1a0830',x+5,y+3,6,7);px('#2a1045',x+6,y+4,4,5);
  px('#ff2020',x+6,y+4,2,2);px('#ff2020',x+8,y+4,2,2);
  px('#1a0830',x+5,y+1,2,3);px('#1a0830',x+9,y+1,2,3);
  px('#e8e8d8',x+6,y+10,1,2);px('#e8e8d8',x+9,y+10,1,2);
}

function drawBoss(sx,sy,frame,hp){
  const f=Math.floor(frame)%4, x=sx|0, y=sy|0;
  const phase=hp>26?1:hp>13?2:3;
  const bodyC=phase===1?'#6a1010':phase===2?'#8a1a1a':'#aa2020';
  const armorC=phase===1?'#300808':phase===2?'#400a0a':'#550a0a';
  const glowC=phase===1?'#ff6020':phase===2?'#ff8020':'#ffaa20';
  px('#c83020',x+8,y,4,8);px('#c83020',x+7,y+1,2,2);
  px('#c83020',x+32,y,4,8);px('#c83020',x+35,y+1,2,2);
  px(bodyC,x+10,y+6,24,16);px(armorC,x+8,y+8,4,12);px(armorC,x+32,y+8,4,12);
  px(glowC,x+14,y+10,6,4);px(glowC,x+24,y+10,6,4);
  px('#ffffff',x+15,y+11,3,2);px('#ffffff',x+25,y+11,3,2);
  px('#000000',x+14,y+18,16,4);
  px('#d8d8c0',x+15,y+18,2,3);px('#d8d8c0',x+19,y+18,2,4);px('#d8d8c0',x+23,y+18,2,4);px('#d8d8c0',x+27,y+18,2,3);
  px(bodyC,x+8,y+22,28,14);px(armorC,x+6,y+22,4,14);px(armorC,x+34,y+22,4,14);
  px(glowC,x+18,y+26,8,4);px(glowC,x+20,y+24,4,8);
  const aw=[0,2,0,-2][f];
  px(bodyC,x+0,y+22+aw,8,18);px(bodyC,x+36,y+22-aw,8,18);
  px('#c83020',x+0,y+38+aw,8,4);px('#c83020',x+36,y+38-aw,8,4);
  const ll=[0,1,0,-1][f];
  px(bodyC,x+10,y+36+ll,10,8);px(bodyC,x+24,y+36-ll,10,8);
  px(armorC,x+8,y+42+ll,14,2);px(armorC,x+22,y+42-ll,14,2);
  if(phase===3){ctx.globalAlpha=0.3;ctx.fillStyle=glowC;ctx.fillRect(x-4,y-4,52,52);ctx.globalAlpha=1;}
}

function drawFireball(sx,sy,frame){
  const f=Math.floor(frame)%4, x=sx|0, y=sy|0, pulse=[0,1,0,-1][f];
  ctx.globalAlpha=0.6;ctx.fillStyle='#ff8000';ctx.fillRect(x-2+pulse,y-2+pulse,10+(-pulse*2),10+(-pulse*2));ctx.globalAlpha=1;
  px('#ffcc00',x+1,y+1,4,4);px('#ffffff',x+2,y+2,2,2);
  ctx.globalAlpha=0.4;ctx.fillStyle='#ff4000';ctx.fillRect(x+5,y+2,4,3);ctx.globalAlpha=1;
}

function drawBackground(camX){
  ctx.fillStyle='#0a0818';ctx.fillRect(0,0,W,H);
  const ox2=(camX*0.2)|0;
  ctx.fillStyle='#1a1428';
  for(let bx=-(ox2%32);bx<W+32;bx+=32)for(let by=0;by<GROUND_Y-10;by+=24)ctx.fillRect(bx|0,by|0,30,22);
  ctx.fillStyle='#0e0d1a';
  for(let bx=-(ox2%32);bx<W+32;bx+=32)for(let by=0;by<GROUND_Y-10;by+=24){ctx.fillRect(bx|0,by|0,32,2);ctx.fillRect(bx|0,by|0,2,24);}
  const ox3=(camX*0.5)|0;
  for(let p2=-(ox3%128);p2<W+128;p2+=128){
    const bx2=p2|0;
    ctx.fillStyle='#2a2240';ctx.fillRect(bx2,10,14,GROUND_Y-10);
    ctx.fillStyle='#1a1430';ctx.fillRect(bx2,10,3,GROUND_Y-10);
    ctx.fillStyle='#3a3258';ctx.fillRect(bx2+11,10,3,GROUND_Y-10);
    ctx.fillStyle='#4a4268';ctx.fillRect(bx2-2,8,18,4);
    const tx=bx2+5, ty=GROUND_Y-70;
    ctx.fillStyle='#503018';ctx.fillRect(tx,ty,4,10);
    const flicker=Math.sin(Date.now()*0.005+bx2)*2;
    ctx.fillStyle='#ff8800';ctx.fillRect(tx-1,(ty-8+flicker)|0,6,6);
    ctx.fillStyle='#ffcc00';ctx.fillRect(tx,(ty-6+flicker)|0,4,4);
    ctx.fillStyle='#ffffff';ctx.fillRect(tx+1,(ty-5+flicker)|0,2,2);
  }
}

function drawGround(camX){
  GROUND_SEGS.forEach(seg=>{
    const sx=(seg.x1-camX)|0, ex=(seg.x2-camX)|0;
    if(ex<0||sx>W)return;
    ctx.fillStyle='#5a4e6a';ctx.fillRect(sx,GROUND_Y,ex-sx,4);
    ctx.fillStyle='#4a3e5a';ctx.fillRect(sx,GROUND_Y+4,ex-sx,H-GROUND_Y-4);
    ctx.fillStyle='#6a5e7a';
    for(let tx=sx;tx<ex;tx+=16){ctx.fillRect(tx,GROUND_Y,15,3);ctx.fillStyle='#3a2e4a';ctx.fillRect(tx,GROUND_Y,1,4);ctx.fillStyle='#6a5e7a';}
    ctx.fillStyle='#2a2038';
    for(let tx=sx;tx<ex;tx+=16)ctx.fillRect(tx,GROUND_Y+4,Math.min(16,ex-tx),1);
  });
  PLATFORMS.forEach(([ppx,py,pw])=>{
    const sx=(ppx-camX)|0;
    if(sx+pw<0||sx>W)return;
    ctx.fillStyle='#5a4e6a';ctx.fillRect(sx,py,pw,6);
    ctx.fillStyle='#6a5e7a';ctx.fillRect(sx,py,pw,3);
    ctx.fillStyle='#3a2e4a';ctx.fillRect(sx,py+5,pw,1);
    for(let tx=sx;tx<sx+pw;tx+=16){ctx.fillStyle='#3a2e4a';ctx.fillRect(tx,py,1,6);}
  });
}

function drawHUD(player,score,boss){
  for(let i=0;i<6;i++){
    const hx=4+i*12, hy=4;
    ctx.fillStyle=i<player.hp?'#e02020':'#401010';
    ctx.fillRect(hx+1,hy,4,2);ctx.fillRect(hx+5,hy,4,2);ctx.fillRect(hx,hy+1,9,4);
    ctx.fillRect(hx+1,hy+4,7,2);ctx.fillRect(hx+2,hy+5,5,2);ctx.fillRect(hx+3,hy+6,3,1);ctx.fillRect(hx+4,hy+7,1,1);
  }
  drawText('SCORE:'+String(score).padStart(6,'0'),W-80,4,'#f8e800');
  if(boss&&boss.active){
    const bw=120,bx=(W-bw)/2|0,by=8;
    ctx.fillStyle='#200808';ctx.fillRect(bx-1,by-1,bw+2,9);
    ctx.fillStyle='#e02020';ctx.fillRect(bx,by,(bw*boss.hp/40)|0,7);
    ctx.fillStyle='#ff6060';ctx.fillRect(bx,by,(bw*boss.hp/40)|0,2);
    drawText('DEMON LORD',bx+bw/2-22,by-8,'#ff4040');
  }
}

function drawText(str,x,y,color,scale){
  scale=scale||1;ctx.fillStyle=color||'#ffffff';let cx=x;
  for(const ch of str.toUpperCase()){
    const g=FONT[ch]||FONT[' '],rows=g.length,cols=g[0].length;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(g[r][c])ctx.fillRect((cx+c*scale)|0,(y+r*scale)|0,scale,scale);
    cx+=(cols+1)*scale;
  }
}

function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function applyGravity(e){e.vy+=GRAVITY;if(e.vy>8)e.vy=8;e.y+=e.vy;}
function resolveGround(e){
  const bot=e.y+e.h;
  for(const seg of GROUND_SEGS)
    if(e.x+e.w>seg.x1&&e.x<seg.x2&&e.vy>=0&&bot>=GROUND_Y&&bot<=GROUND_Y+e.vy+2){e.y=GROUND_Y-e.h;e.vy=0;return true;}
  for(const [ppx,py,pw] of PLATFORMS)
    if(e.x+e.w>ppx&&e.x<ppx+pw&&e.vy>=0&&bot>=py&&bot<=py+e.vy+4){e.y=py-e.h;e.vy=0;return true;}
  return false;
}

let gameState='title',score=0,titleFrame=0;
let player,skeletons,bats,boss,particles2;
let cameraX=0,bossLock=false,bossLockTimer=0,tickCount=0;

function makePlayer(){return{x:40,y:GROUND_Y-22,vx:0,vy:0,w:12,h:22,hp:6,frame:0,frameTick:0,facingRight:true,state:'idle',attackTimer:0,attackCooldown:0,iframes:0,grounded:false,dead:false};}
function makeSkeleton(x){return{x,y:GROUND_Y-25,vx:-0.5,vy:0,w:14,h:25,hp:3,frame:0,frameTick:0,dir:-1,startX:x,patrolDist:80,dead:false,dying:0,knockback:0};}
function makeBat(x,y){return{x,y,baseY:y,vx:-0.6,vy:0,w:16,h:10,hp:1,frame:0,frameTick:0,sinOffset:Math.random()*Math.PI*2,dead:false,dying:0,knockback:0};}
function makeBoss(){return{x:3600,y:GROUND_Y-44,vx:0,vy:0,w:44,h:44,hp:40,frame:0,frameTick:0,facingRight:false,active:false,triggered:false,triggerTimer:0,dead:false,dying:0,iframes:0,shootTimer:0,fireballs:[],phase:1};}

function initGame(){
  player=makePlayer();score=0;particles=[];cameraX=0;bossLock=false;bossLockTimer=0;tickCount=0;
  skeletons=[200,380,550,900,1100,1300,1600,1800,2100,2500,2800,3100,3300].map(makeSkeleton);
  bats=[[300,90],[480,80],[700,85],[1050,75],[1250,90],[1700,80],[2200,85],[2600,75],[2900,90]].map(([x,y])=>makeBat(x,y));
  boss=makeBoss();
}

function updatePlayer(){
  const p=player; if(p.dead)return;
  const left=pressed(['ArrowLeft','KeyA']),right=pressed(['ArrowRight','KeyD']);
  const jump=pressed(['ArrowUp','KeyW','Space']),atk=pressed(['KeyZ','KeyX']);
  if(!bossLock){if(left){p.vx=-PLAYER_SPEED;p.facingRight=false;}else if(right){p.vx=PLAYER_SPEED;p.facingRight=true;}else p.vx*=0.7;}else p.vx*=0.7;
  if(p.x<0){p.x=0;p.vx=0;}if(p.x+p.w>LEVEL_W){p.x=LEVEL_W-p.w;p.vx=0;}
  if(bossLock&&p.x>3500){p.x=3500;p.vx=0;}
  p.x+=p.vx;
  applyGravity(p);
  const wasG=p.grounded;p.grounded=resolveGround(p);
  if(p.grounded&&!wasG)sfxLand();
  if(p.y>H+20){
    p.hp--;if(p.hp<=0){p.dead=true;sfxDeath();setTimeout(()=>{gameState='gameover';},800);return;}
    p.x=Math.max(0,cameraX);p.y=GROUND_Y-p.h;p.vx=0;p.vy=0;p.iframes=120;sfxHit();
  }
  if(jump&&p.grounded&&p.vy>=-0.1){p.vy=JUMP_VEL;p.grounded=false;sfxJump();}
  if(p.attackCooldown>0)p.attackCooldown--;
  if(atk&&p.attackCooldown===0){p.state='attack';p.attackTimer=18;p.attackCooldown=22;sfxAttack();}
  if(p.attackTimer>0){p.attackTimer--;p.state='attack';}else if(!p.grounded)p.state='jump';else if(Math.abs(p.vx)>0.3)p.state='run';else p.state='idle';
  if(p.iframes>0)p.iframes--;
  p.frameTick++;
  if(p.state==='run'&&p.frameTick%7===0)p.frame=(p.frame+1)%4;
  if(p.state==='attack'&&p.frameTick%6===0)p.frame=(p.frame+1)%4;
  if(p.state==='idle')p.frame=0;
}

function updateSkeletons(){
  skeletons.forEach(sk=>{
    if(sk.dead)return;if(sk.dying>0){sk.dying--;return;}
    if(sk.knockback>0){sk.knockback--;sk.x+=sk.vx;sk.y+=sk.vy;sk.vy+=GRAVITY;resolveGround(sk);return;}
    sk.x+=sk.vx*sk.dir;
    if(sk.x<sk.startX-sk.patrolDist||sk.x>sk.startX+sk.patrolDist)sk.dir*=-1;
    let onSeg=false;for(const seg of GROUND_SEGS)if(sk.x+sk.w>seg.x1&&sk.x<seg.x2){onSeg=true;break;}
    if(!onSeg)sk.dir*=-1;
    applyGravity(sk);resolveGround(sk);
    sk.frameTick++;if(sk.frameTick%8===0)sk.frame=(sk.frame+1)%4;
    if(player.iframes===0&&!player.dead&&rectOverlap(player.x,player.y,player.w,player.h,sk.x,sk.y,sk.w,sk.h)){
      player.hp--;player.iframes=90;player.vy=-3;player.vx=player.x<sk.x?-2:2;sfxHit();spawnParticles(player.x+6,player.y+10,'#ff4040',6);
      if(player.hp<=0){player.dead=true;sfxDeath();setTimeout(()=>{gameState='gameover';},800);}
    }
    if(player.state==='attack'&&player.attackTimer>10){
      const sw=player.facingRight?player.x+player.w:player.x-12;
      if(rectOverlap(sw,player.y,14,player.h,sk.x,sk.y,sk.w,sk.h)){
        sk.hp--;const kb=player.facingRight?3:-3;sk.vx=kb;sk.vy=-2;sk.knockback=12;spawnParticles(sk.x+7,sk.y+12,'#ffffff',8);
        if(sk.hp<=0){sk.dying=30;setTimeout(()=>{sk.dead=true;},300);score+=100;spawnParticles(sk.x+7,sk.y+12,'#ffff00',12);sfxDeath();}else sfxHit();
      }
    }
  });
}

function updateBats(){
  bats.forEach(bt=>{
    if(bt.dead)return;if(bt.dying>0){bt.dying--;return;}
    if(bt.knockback>0){bt.knockback--;bt.x+=bt.vx;bt.y+=bt.vy;return;}
    bt.x+=bt.vx;bt.y=bt.baseY+Math.sin(tickCount*0.05+bt.sinOffset)*18;
    if(bt.x<40||bt.x+bt.w>LEVEL_W-40)bt.vx*=-1;
    const dx=player.x-bt.x;
    if(Math.abs(dx)<200&&!player.dead){bt.vx+=(dx>0?0.02:-0.02);if(Math.abs(bt.vx)>1.2)bt.vx=1.2*Math.sign(bt.vx);}
    bt.frameTick++;if(bt.frameTick%5===0)bt.frame=(bt.frame+1)%4;
    if(player.iframes===0&&!player.dead&&rectOverlap(player.x,player.y,player.w,player.h,bt.x,bt.y,bt.w,bt.h)){
      player.hp--;player.iframes=90;player.vy=-3;player.vx=player.x<bt.x?-2:2;sfxHit();spawnParticles(player.x+6,player.y+10,'#ff4040',6);
      if(player.hp<=0){player.dead=true;sfxDeath();setTimeout(()=>{gameState='gameover';},800);}
    }
    if(player.state==='attack'&&player.attackTimer>10){
      const sw=player.facingRight?player.x+player.w:player.x-12;
      if(rectOverlap(sw,player.y,14,player.h,bt.x,bt.y,bt.w,bt.h)){
        bt.hp--;const kb=player.facingRight?4:-4;bt.vx=kb;bt.vy=-3;bt.knockback=10;spawnParticles(bt.x+8,bt.y+5,'#ffffff',6);
        if(bt.hp<=0){bt.dying=20;setTimeout(()=>{bt.dead=true;},200);score+=150;spawnParticles(bt.x+8,bt.y+5,'#aa00ff',10);sfxDeath();}else sfxHit();
      }
    }
  });
}

function updateBoss(){
  const b=boss;
  if(!b.triggered){if(player.x+player.w>3500&&!player.dead){b.triggered=true;b.active=true;bossLock=true;bossLockTimer=90;b.triggerTimer=60;}return;}
  if(b.dead){if(b.dying>0){b.dying--;spawnParticles(b.x+22,b.y+22,'#ff4400',3,3);spawnParticles(b.x+22,b.y+22,'#ffaa00',2,2);}return;}
  if(b.triggerTimer>0){b.triggerTimer--;return;}
  b.phase=b.hp>26?1:b.hp>13?2:3;
  const speed=b.phase===1?0.7:b.phase===2?1.1:1.6;
  const shootInterval=b.phase===1?150:b.phase===2?100:70;
  const dx=player.x-b.x;b.facingRight=dx>0;
  if(Math.abs(dx)>60)b.vx=Math.sign(dx)*speed;else b.vx*=0.8;
  b.x+=b.vx;
  if(b.x<3400)b.x=3400;if(b.x+b.w>LEVEL_W)b.x=LEVEL_W-b.w;
  applyGravity(b);resolveGround(b);
  if(b.iframes>0)b.iframes--;
  b.shootTimer++;if(b.shootTimer>=shootInterval){
    b.shootTimer=0;const count=b.phase===3?3:b.phase===2?2:1;
    for(let i=0;i<count;i++){
      const angle=b.phase===3?[Math.PI,Math.PI+0.4,Math.PI-0.4][i]:(b.facingRight?0:Math.PI);
      b.fireballs.push({x:b.x+(b.facingRight?b.w:-6),y:b.y+16,vx:Math.cos(angle)*2.5,vy:b.phase===3?Math.sin(angle)*1.5:-0.5,w:8,h:8,frame:0,frameTick:0,dead:false});sfxFireball();
    }
  }
  b.fireballs=b.fireballs.filter(fb=>!fb.dead);
  b.fireballs.forEach(fb=>{
    fb.vy+=0.05;fb.x+=fb.vx;fb.y+=fb.vy;fb.frameTick++;if(fb.frameTick%4===0)fb.frame=(fb.frame+1)%4;
    if(fb.x<cameraX-50||fb.x>cameraX+W+50||fb.y>H+20)fb.dead=true;
    if(!player.dead&&player.iframes===0&&rectOverlap(fb.x,fb.y,fb.w,fb.h,player.x,player.y,player.w,player.h)){
      player.hp--;player.iframes=90;player.vy=-3;player.vx=player.x<fb.x?-2:2;sfxHit();spawnParticles(player.x+6,player.y+10,'#ff8800',8);fb.dead=true;
      if(player.hp<=0){player.dead=true;sfxDeath();setTimeout(()=>{gameState='gameover';},800);}
    }
    if(player.state==='attack'&&player.attackTimer>10){
      const sw=player.facingRight?player.x+player.w:player.x-12;
      if(rectOverlap(sw,player.y,14,player.h,fb.x,fb.y,fb.w,fb.h)){fb.dead=true;spawnParticles(fb.x+4,fb.y+4,'#ffaa00',8);score+=50;}
    }
  });
  b.frameTick++;if(b.frameTick%8===0)b.frame=(b.frame+1)%4;
  if(!player.dead&&player.iframes===0&&rectOverlap(player.x,player.y,player.w,player.h,b.x,b.y,b.w,b.h)){
    player.hp--;player.iframes=90;player.vy=-4;player.vx=player.x<b.x?-3:3;sfxHit();spawnParticles(player.x+6,player.y+10,'#ff4040',8);
    if(player.hp<=0){player.dead=true;sfxDeath();setTimeout(()=>{gameState='gameover';},800);}
  }
  if(b.iframes===0&&player.state==='attack'&&player.attackTimer>10){
    const sw=player.facingRight?player.x+player.w:player.x-12;
    if(rectOverlap(sw,player.y,14,player.h,b.x,b.y,b.w,b.h)){
      b.hp--;b.iframes=15;sfxBossHit();spawnParticles(b.x+22,b.y+22,'#ff4444',10,2);
      if(b.hp<=0){b.dead=true;b.dying=120;b.active=false;score+=2000;spawnParticles(b.x+22,b.y+22,'#ffff00',30,4);spawnParticles(b.x+22,b.y+22,'#ff8800',20,3);sfxVictory();setTimeout(()=>{gameState='victory';},2500);}
    }
  }
}

function updateCamera(){
  if(bossLock){bossLockTimer--;if(bossLockTimer<=0)bossLock=false;}
  const targetX=player.x-W/2+player.w/2;
  cameraX+=(targetX-cameraX)*0.1;
  cameraX=Math.max(0,Math.min(LEVEL_W-W,cameraX));
}

function drawTouchControls(){
  if(!isMobile())return;
  ctx.save();
  function drawBtn(b,label,active){
    ctx.globalAlpha=active?0.75:0.35;ctx.fillStyle=active?'#ffffff':'#aaccff';ctx.strokeStyle='#ffffff';ctx.lineWidth=1;
    ctx.beginPath();const r=6;
    ctx.moveTo(b.x+r,b.y);ctx.lineTo(b.x+b.w-r,b.y);ctx.arcTo(b.x+b.w,b.y,b.x+b.w,b.y+r,r);
    ctx.lineTo(b.x+b.w,b.y+b.h-r);ctx.arcTo(b.x+b.w,b.y+b.h,b.x+b.w-r,b.y+b.h,r);
    ctx.lineTo(b.x+r,b.y+b.h);ctx.arcTo(b.x,b.y+b.h,b.x,b.y+b.h-r,r);
    ctx.lineTo(b.x,b.y+r);ctx.arcTo(b.x,b.y,b.x+r,b.y,r);ctx.closePath();ctx.fill();
    ctx.globalAlpha=active?0.9:0.5;ctx.stroke();
    ctx.globalAlpha=active?1:0.7;ctx.fillStyle=active?'#000000':'#ffffff';
    ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,b.x+b.w/2,b.y+b.h/2);
  }
  drawBtn(BTNS.left,'◄',touch.left);drawBtn(BTNS.right,'►',touch.right);
  drawBtn(BTNS.attack,'ATK',touch.attack);drawBtn(BTNS.jump,'JMP',touch.jump);
  ctx.restore();
}

function drawTitle(){
  ctx.fillStyle='#0a0818';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1428';for(let bx=0;bx<W;bx+=32)for(let by=0;by<H;by+=24)ctx.fillRect(bx,by,30,22);
  ctx.fillStyle='#0e0d1a';for(let bx=0;bx<W;bx+=32)for(let by=0;by<H;by+=24){ctx.fillRect(bx,by,32,2);ctx.fillRect(bx,by,2,24);}
  const pulse=Math.sin(titleFrame*0.04)*0.5+0.5;
  ctx.globalAlpha=0.6+pulse*0.4;drawText('DUNGEON',58,28,'#ff4444',3);drawText('BLADE',78,52,'#ff8800',3);ctx.globalAlpha=1;
  ctx.fillStyle='#c8c8c8';ctx.fillRect(148,80,3,30);ctx.fillStyle='#888888';ctx.fillRect(140,82,19,3);ctx.fillStyle='#a06820';ctx.fillRect(149,80,1,5);
  drawText('ARROW/WASD - MOVE',60,110,'#a0a0c0',1);drawText('SPACE/W/UP - JUMP',60,120,'#a0a0c0',1);drawText('Z or X     - ATTACK',60,130,'#a0a0c0',1);
  if(Math.floor(titleFrame/30)%2)drawText(isMobile()?'TAP SCREEN TO START':'PRESS ANY KEY TO START',42,160,'#f8e800',1);

function drawGameOver(){

function drawVictory(){
  ctx.fillStyle='#000818';ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.5;ctx.fillStyle='#001850';ctx.fillRect(20,30,W-40,120);ctx.globalAlpha=1;

  ctx.globalAlpha=0.7+pulse*0.3;drawText('VICTORY!',90,44,'#f8e800',2);ctx.globalAlpha=1;
  drawText('DEMON LORD DEFEATED',50,76,'#ff8800',1);drawText('FINAL SCORE: '+score,78,92,'#f8e800',1);
  drawText('THE DUNGEON IS SAFE.',50,110,'#a0e0ff',1);drawText(isMobile()?'TAP TO PLAY AGAIN':'PRESS ANY KEY',60,140,'#808080',1);

function gameLoop(){
  tickCount++;
  const anyInput=Object.values(keys).some(v=>v)||touchTap;
  if(gameState==='title'){
    drawTitle();
    if(anyInput){Object.keys(keys).forEach(k=>keys[k]=false);gameState='playing';initGame();}
  }else if(gameState==='playing'){
    updatePlayer();updateSkeletons();updateBats();updateBoss();updateCamera();updateParticles();
    drawBackground(cameraX);drawGround(cameraX);
    skeletons.forEach(sk=>{
      if(sk.dead)return;const sx=(sk.x-cameraX)|0;if(sx+sk.w<-10||sx>W+10)return;
      ctx.globalAlpha=sk.dying>0?sk.dying/30:1;drawSkeleton(sx,sk.y|0,sk.frame,sk.dir);ctx.globalAlpha=1;
    });
    bats.forEach(bt=>{
      if(bt.dead)return;const bx=(bt.x-cameraX)|0;if(bx+bt.w<-10||bx>W+10)return;
      ctx.globalAlpha=bt.dying>0?bt.dying/20:1;drawBat(bx,bt.y|0,bt.frame);ctx.globalAlpha=1;
    });
    if(boss.triggered&&!boss.dead){
      const bsx=(boss.x-cameraX)|0;
      ctx.globalAlpha=boss.iframes>0&&Math.floor(boss.iframes/3)%2?0.5:1;
      drawBoss(bsx,boss.y|0,boss.frame,boss.hp);ctx.globalAlpha=1;
      boss.fireballs.forEach(fb=>{if(!fb.dead)drawFireball((fb.x-cameraX)|0,fb.y|0,fb.frame);});
    }
    drawPlayer((player.x-cameraX)|0,player.y|0,player.frame,player.facingRight,player.state,player.iframes);
    drawParticles(cameraX);drawHUD(player,score,boss);drawTouchControls();
    if(boss.triggered&&boss.triggerTimer>0){
      const alpha=boss.triggerTimer/60;ctx.globalAlpha=alpha*0.7;ctx.fillStyle='#ff2200';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
      if(boss.triggerTimer===50){drawText('DEMON LORD',(W-50)/2,H/2-6,'#ffffff',1);drawText('APPROACHES!',(W-55)/2,H/2+4,'#ff8800',1);}
    }
  }else if(gameState==='gameover'){
    drawBackground(cameraX);drawGround(cameraX);drawParticles(cameraX);drawGameOver();
    if(anyInput){Object.keys(keys).forEach(k=>keys[k]=false);gameState='title';titleFrame=0;}
  }else if(gameState==='victory'){
    drawBackground(cameraX);drawGround(cameraX);drawVictory();
    if(anyInput){Object.keys(keys).forEach(k=>keys[k]=false);gameState='title';titleFrame=0;}
  }
  touchTap=false;
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>

</html>
